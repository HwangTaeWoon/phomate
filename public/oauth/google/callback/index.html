<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoMate OAuth Callback</title>
  </head>
  <body>
    <script>
      (function () {
        var query = window.location.search || '';
        var hash = window.location.hash || '';
        window.location.replace('/' + query + hash);
      })();
    </script>
  </body>
